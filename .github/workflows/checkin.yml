name: Daily Check-in

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node railgun-api-checkin.js
        env:
          RAILGUN_COOKIE_SIG: ${{ secrets.RAILGUN_COOKIE_SIG }}
          RAILGUN_COOKIE_SESS: ${{ secrets.RAILGUN_COOKIE_SESS }}
